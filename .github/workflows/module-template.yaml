on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string

jobs:
  publish-module:
    name: 🚀 Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/templates/pwsh-publish
        with:
          path: ${{ inputs.path }}
